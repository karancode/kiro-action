name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git status dist/ --porcelain)" ]; then
            echo "dist/index.js is out of date. Run 'bun run build' and commit."
            git diff dist/
            exit 1
          fi
